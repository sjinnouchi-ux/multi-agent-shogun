    reason: Codex plan authoring is useful, while Shogun planning already belongs to its role and task protocol.
    upstream:
      repository: "https://github.com/obra/superpowers"
      tag: v6.1.1
      commit: d884ae04edebef577e82ff7c4e143debd0bbec99
      path: skills/writing-plans/SKILL.md
  - id: writing-skills
    disposition: codex-only
    approval_ref: superpowers-partial-adoption-2026-07-14
    reason: Codex can use the upstream authoring workflow; Shogun uses the registry intake and role-safe skill-creator adaptation.
    upstream:
      repository: "https://github.com/obra/superpowers"
      tag: v6.1.1
      commit: d884ae04edebef577e82ff7c4e143debd0bbec99
      path: skills/writing-skills/SKILL.md
